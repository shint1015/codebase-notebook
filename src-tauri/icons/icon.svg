<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- squircle background: deep navy, app theme -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#273246"/>
      <stop offset="0.55" stop-color="#161d29"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.18" r="0.75">
      <stop offset="0" stop-color="#4f8cff" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#4f8cff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#4f8cff" stop-opacity="0"/>
    </radialGradient>
    <!-- pages -->
    <linearGradient id="pageL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c9d4e4"/>
      <stop offset="0.82" stop-color="#eef2f8"/>
      <stop offset="1" stop-color="#dfe6f0"/>
    </linearGradient>
    <linearGradient id="pageR" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0" stop-color="#c9d4e4"/>
      <stop offset="0.82" stop-color="#eef2f8"/>
      <stop offset="1" stop-color="#dfe6f0"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6ba1ff"/>
      <stop offset="1" stop-color="#3568d4"/>
    </linearGradient>
    <filter id="drop" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- macOS-style squircle with margin -->
  <rect x="64" y="64" width="896" height="896" rx="204" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="896" rx="204" fill="url(#glow)"/>
  <rect x="66.5" y="66.5" width="891" height="891" rx="201.5" fill="none"
        stroke="#ffffff" stroke-opacity="0.07" stroke-width="5"/>

  <g filter="url(#drop)">
    <!-- book cover (slightly larger, behind pages) -->
    <path d="M512 328
             C 428 288, 322 282, 252 306
             C 236 312, 226 326, 226 344
             L 226 716
             C 226 738, 244 752, 264 746
             C 330 728, 430 734, 512 774
             C 594 734, 694 728, 760 746
             C 780 752, 798 738, 798 716
             L 798 344
             C 798 326, 788 312, 772 306
             C 702 282, 596 288, 512 328 Z"
          fill="#3d5a94"/>
    <!-- left page -->
    <path d="M512 348
             C 436 312, 340 306, 276 328
             C 266 331, 260 340, 260 350
             L 260 700
             C 260 714, 272 723, 285 720
             C 348 705, 440 712, 512 748 Z"
          fill="url(#pageL)"/>
    <!-- right page -->
    <path d="M512 348
             C 588 312, 684 306, 748 328
             C 758 331, 764 340, 764 350
             L 764 700
             C 764 714, 752 723, 739 720
             C 676 705, 584 712, 512 748 Z"
          fill="url(#pageR)"/>
    <!-- spine shading -->
    <path d="M512 348 C 496 341, 481 335, 466 331 L 466 731 C 481 736, 496 741, 512 748 Z"
          fill="#94a3ba" opacity="0.35"/>
    <path d="M512 348 C 528 341, 543 335, 558 331 L 558 731 C 543 736, 528 741, 512 748 Z"
          fill="#94a3ba" opacity="0.35"/>

    <!-- left page: code lines (indented like code) -->
    <g fill="#4f8cff">
      <rect x="308" y="392" width="128" height="26" rx="13" transform="rotate(-4 308 392)"/>
      <rect x="336" y="452" width="112" height="26" rx="13" transform="rotate(-4 336 452)" fill="#7fabff"/>
      <rect x="336" y="512" width="76"  height="26" rx="13" transform="rotate(-4 336 512)" fill="#7fabff"/>
      <rect x="308" y="572" width="96"  height="26" rx="13" transform="rotate(-4 308 572)"/>
    </g>

    <!-- right page: doc lines + citation chip -->
    <g fill="#8593a8">
      <rect x="576" y="386" width="140" height="26" rx="13" transform="rotate(4 576 386)"/>
      <rect x="580" y="446" width="112" height="26" rx="13" transform="rotate(4 580 446)"/>
      <rect x="584" y="506" width="126" height="26" rx="13" transform="rotate(4 584 506)"/>
    </g>
    <!-- citation chip [1] -->
    <g transform="rotate(4 590 566)">
      <rect x="588" y="566" width="64" height="40" rx="20" fill="#4f8cff"/>
      <text x="620" y="596" font-family="SF Pro, Helvetica, Arial, sans-serif" font-size="30"
            font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
    </g>

    <!-- bookmark ribbon over the right page -->
    <path d="M676 300 L 676 208 C 676 200, 682 194, 690 194 L 742 194 C 750 194, 756 200, 756 208 L 756 318
             L 716 292 Z"
          fill="url(#ribbon)"/>
  </g>
</svg>
